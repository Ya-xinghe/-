            const IV_LABELS_ORDER = ["生命", "物攻", "魔攻", "物防", "魔防", "速度"];

                "无虑": {plus:"物防", minus:"魔抗"}, "孤僻": {plus:"物攻", minus:"物防"}, "实干": {plus:"平衡", minus:""},
                "认真": {plus:"平衡", minus:""}, "浮躁": {plus:"平衡", minus:""}, "沉默": {plus:"生命", minus:"物攻"},
                "聪明": {plus:"魔攻", minus:"物攻"}, "平和": {plus:"生命", minus:"魔攻"}, "专注": {plus:"魔攻", minus:"物防"},
                "忧郁": {plus:"生命", minus:"物防"}, "偏执": {plus:"魔攻", minus:"魔防"}, "粗心": {plus:"生命", minus:"魔防"},
                "逞强": {plus:"物攻", minus:"生命"}, "踏实": {plus:"生命", minus:"速度"}, "理性": {plus:"魔攻", minus:"生命"},
                "警惕": {plus:"魔防", minus:"物攻"}, "害羞": {plus:"魔防", minus:"魔攻"}, "莽撞": {plus:"速度", minus:"魔防"},
                "懒散": {plus:"物防", minus:"魔防"}, "热情": {plus:"速度", minus:"生命"}, "坦率": {plus:"物防", minus:"生命"},
                "焦虑": {plus:"魔防", minus:"生命"}
            };

            let compareSlots = [null, null];
            let currentResultSnapshot = null;
            let currentArchiveSlot = -1;
            let targetRenameIdx = -1;
            let themeConfirmCallback = null;
            let childNameEdited = false;

            // 工具函数
            function createBubbles() { const c = document.getElementById('bubblesContainer'); for(let i=0;i<15;i++){ const b=document.createElement('div'); b.classList.add('bubble'); const s=Math.random()*30+10; b.style.width=s+'px'; b.style.height=s+'px'; b.style.left=Math.random()*100+'%'; b.style.animationDuration=Math.random()*8+6+'s'; b.style.animationDelay=Math.random()*10+'s'; c.appendChild(b); } }
            function combinations(arr,k){ if(k===0)return[[]]; if(arr.length<k)return[]; const r=[]; function h(s,c){ if(c.length===k){ r.push([...c]); return; } for(let i=s;i<arr.length;i++){ c.push(arr[i]); h(i+1,c); c.pop(); } } h(0,[]); return r; }
            function permutations(arr){ if(arr.length===0)return[[]]; const r=[]; function p(rem,cur){ if(rem.length===0){ r.push([...cur]); return; } for(let i=0;i<rem.length;i++){ const n=rem.slice(0,i).concat(rem.slice(i+1)); cur.push(rem[i]); p(n,cur); cur.pop(); } } p(arr,[]); return r; }

            // 计算核心
            class BreedCalculator{
                constructor(fatherSet, motherSet, kingBallAttr = null){
                    this.fatherSet = new Set(fatherSet); this.motherSet = new Set(motherSet);
                    this.fatherNum = this.fatherSet.size; this.motherNum = this.motherSet.size;
                    this.kingBallAttr = kingBallAttr; this.isKingBall = kingBallAttr !== null;
                    this.weights = {};
                    for(let s of SLOTS){ let cnt = (this.fatherSet.has(s)?1:0)+(this.motherSet.has(s)?1:0); this.weights[s] = 100 + 300 * cnt; }
                    this.totalWeight = Object.values(this.weights).reduce((a,b)=>a+b,0);
                    if(this.isKingBall){ this.effectiveSlots = SLOTS.filter(s=>s!==this.kingBallAttr); this.effectiveWeights = {}; for(let s of this.effectiveSlots) this.effectiveWeights[s] = this.weights[s]; this.totalEffectiveWeight = Object.values(this.effectiveWeights).reduce((a,b)=>a+b,0); this.effectiveK = 2; }
                    this.prob1 = this.prob2 = this.prob3 = 0; if(this.isKingBall) this.prob3 = 1; else this._calcCountProbs(); this.comboCache = {};
                }
                _calcCountProbs(){ const w1=0; const w2=100+(this.fatherNum===2?300:0)+(this.motherNum===2?300:0); const w3=100+(this.fatherNum===3?300:0)+(this.motherNum===3?300:0); const total = w1+w2+w3; this.prob1 = total===0 ? 0 : w1/total; this.prob2 = total===0 ? 0 : w2/total; this.prob3 = total===0 ? 0 : w3/total; }
                probabilityOfExactCombo(combo){ const k = combo.length; const key = combo.slice().sort().join(','); if(!this.comboCache[k]) this.comboCache[k] = {}; if(this.comboCache[k][key] !== undefined) return this.comboCache[k][key]; let prob = 0; const perms = permutations(combo); for(let perm of perms){ let p = 1.0; let remainingW = this.totalWeight; for(let s of perm){ p *= this.weights[s] / remainingW; remainingW -= this.weights[s]; } prob += p; } this.comboCache[k][key] = prob; return prob; }
                probabilityOfEffectiveCombo(combo){ if(combo.length !== this.effectiveK) return 0; const key = combo.slice().sort().join(','); const cacheKey = 'eff_'+key; if(!this.comboCache[this.effectiveK]) this.comboCache[this.effectiveK] = {}; if(this.comboCache[this.effectiveK][cacheKey] !== undefined) return this.comboCache[this.effectiveK][cacheKey]; let prob = 0; const perms = permutations(combo); for(let perm of perms){ let p = 1.0; let remainingW = this.totalEffectiveWeight; for(let s of perm){ p *= this.effectiveWeights[s] / remainingW; remainingW -= this.effectiveWeights[s]; } prob += p; } this.comboCache[this.effectiveK][cacheKey] = prob; return prob; }
                getTotalProbability(condition){ let total = 0; for(let k=1;k<=3;k++){ const probK = k===1 ? this.prob1 : (k===2 ? this.prob2 : this.prob3); if(probK===0) continue; const combos = combinations(SLOTS,k); let sum = 0; for(let combo of combos) if(condition(combo)) sum += this.probabilityOfExactCombo(combo); total += probK * sum; } return total; }
                getKingBallProbability(condition){ if(!this.isKingBall) return 0; let sum = 0; const combos = combinations(this.effectiveSlots,2); for(let combo of combos) if(condition(combo)) sum += this.probabilityOfEffectiveCombo(combo); return sum; }
                getSingleAttrProbs(){ const result = {}; for(let s of SLOTS){ if(this.isKingBall && s===this.kingBallAttr) result[s] = 1.0; else if(this.isKingBall) result[s] = this.getKingBallProbability(combo => combo.includes(s)); else result[s] = this.getTotalProbability(combo => combo.includes(s)); } return result; }
                getTargetProb(targetArr){ const uniq = [...new Set(targetArr)]; if(uniq.length===0) return 0; if(this.isKingBall){ if(!uniq.includes(this.kingBallAttr)) return 0; const remaining = uniq.filter(s => s!==this.kingBallAttr); if(remaining.length > this.effectiveK) return 0; if(remaining.length === 0) return 1; return this.getKingBallProbability(combo => remaining.every(t => combo.includes(t))); } else { return this.getTotalProbability(combo => uniq.every(a => combo.includes(a))); } }
                getKingBallRecommendation(targetAttrs){ if(!this.isKingBall) return ""; const remaining = targetAttrs.filter(s => s!==this.kingBallAttr); if(remaining.length===0) return "目标仅包含性格属性，国王球已保证。"; if(remaining.length>2) return "目标属性过多，无法全部继承。"; const recParents = remaining.join('、'); return `推荐使用父母本双方都只有【${recParents}】两条相同个体值的精灵，搭配国王球契约，可最大化完美继承概率。`; }

                getAllCombosRanked(){
                    const results = [];
                    if(this.isKingBall){
                        const effCombos = combinations(this.effectiveSlots, 2);
                        for(let combo of effCombos){
                            const fullCombo = [this.kingBallAttr, ...combo].sort();
                            const prob = this.probabilityOfEffectiveCombo(combo);
                            results.push({ combo: fullCombo, prob });
                        }
                    } else {
                        for(let k=1; k<=3; k++){
                            const probK = k===1 ? this.prob1 : (k===2 ? this.prob2 : this.prob3);
                            if(probK === 0) continue;
                            const combos = combinations(SLOTS, k);
                            for(let combo of combos){
                                const condProb = this.probabilityOfExactCombo(combo);
                                results.push({ combo: combo.slice().sort(), prob: probK * condProb });
                            }
                        }
                    }
                    results.sort((a,b) => b.prob - a.prob);
                    return results;
                }
            }

            // UI交互
            function enforceMaxSelection(cb, gn){ const all = document.querySelectorAll(`input[name="${gn}"]`); if(Array.from(all).filter(c=>c.checked).length>3){ cb.checked = false; const lb = cb.parentElement; lb.classList.add('shake-error'); setTimeout(()=>lb.classList.remove('shake-error'),500); } }

                html += `</div>`;

                const singles = calc.getSingleAttrProbs();
                html += `<div class="scroll-card"><h3><img src="https://patchwiki.biligame.com/images/rocom/e/e4/15ca1cfmq9j16571121rp8b7xbirdzt.png" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;filter:drop-shadow(0 0 6px #a855f7);">六维属性预言</h3><table class="attr-table"><tr><th>属性</th><th>遗传概率</th></tr>`;

                html += `<div class="scroll-card"><h3><img src="https://patchwiki.biligame.com/images/rocom/9/95/ksozotzjdbpobfw37170k4fr513iufu.png" class="icon-medal">完美继承概率计算</h3><p class="tiny-note">选择你希望子代同时拥有的属性（最多3个）</p><div style="margin-bottom:8px;"><button class="btn-small" id="presetParentsBtn">一键填入父母所拥有个体</button><button class="btn-small" id="calcTargetBtn">开始计算</button></div><div class="target-area"><div class="gem-grid" id="targetGems"></div></div><p class="error-txt" id="targetError" style="display:none;"></p><div style="text-align:center;margin:12px 0;"><span class="target-result" id="targetResult">—</span></div><div style="margin-top:15px;"><label><img src="https://patchwiki.biligame.com/images/rocom/0/0d/gkijb43j6tp5kadtksuux84zwrrawua.png" style="width:24px;height:24px;vertical-align:middle;margin-right:6px;">孵化次数模拟：</label><div class="simulator-area"><span>预计准备</span><input type="number" id="eggCount" min="1" value="10"><span>个蛋，至少成功一次的概率：</span><span id="simulatedProb" style="font-weight:bold;color:#2d5a0c;font-size:1.2rem;">—</span></div></div><div id="recommendArea" style="margin-top:15px;"></div><div class="compare-buttons"><button class="btn-small" id="saveToSlotA">📋 保存到方案一</button><button class="btn-small" id="saveToSlotB">📋 保存到方案二</button></div></div>`;

                let panel = document.querySelector('.compare-panel'); if(!panel){ const area = document.getElementById('resultsArea'); panel = document.createElement('div'); panel.className='compare-panel scroll-card'; panel.id='comparePanel'; area.appendChild(panel); }
                if(!compareSlots[0] && !compareSlots[1]){ panel.classList.remove('active'); return; } panel.classList.add('active');
                let maxProb = -1; let winners = [false, false]; const pA = compareSlots[0]?.targetProb ?? -1; const pB = compareSlots[1]?.targetProb ?? -1;
                if(pA>pB && pA>=0) winners[0]=true; if(pB>pA && pB>=0) winners[1]=true;
                let html = '<h3>⚖️ 孵蛋方案对比</h3>'; const names = ['方案一','方案二']; const colors = ['#4a90d9','#e05a4f'];
                for(let i=0;i<2;i++){ const d = compareSlots[i]; if(!d) continue; const wc = winners[i]?'winner':''; html += `<div class="compare-slot ${wc}" style="border-color:${winners[i]?'#ffd700':colors[i]};"><strong style="color:${colors[i]};">${names[i]}</strong><p>父本：${d.father.join('、')||'无'} | 母本：${d.mother.join('、')||'无'} | 国王球：${d.kingBall||'无'}</p><p>遗传条数：1条 ${(d.prob1*100).toFixed(1)}% | 2条 ${(d.prob2*100).toFixed(1)}% | 3条 ${(d.prob3*100).toFixed(1)}%</p><p>单属性概率：${SLOTS.map(s=>`${s}:${(d.singles[s]*100).toFixed(1)}%`).join('，')}</p>${d.target?`<p>完美继承目标：${d.target.join('、')} 概率：<strong>${(d.targetProb*100).toFixed(2)}%</strong></p>`:'<p>尚未计算完美继承</p>'}</div>`; }
                html += '<button class="btn-small" id="clearCompareBtn">清除对比</button>'; panel.innerHTML = html;
                document.getElementById('clearCompareBtn').addEventListener('click', ()=>{ compareSlots=[null,null]; renderComparePanel(); });
            }

            // ========== 存档系统 ==========
            const STORAGE_KEY='poke_breed_slots_v4',MAX_SLOTS=10,MAX_RECORDS=99;
            function loadAllSlots(){const d=localStorage.getItem(STORAGE_KEY);if(d)try{return JSON.parse(d)}catch(e){}return Array.from({length:MAX_SLOTS},(_,i)=>({name:`存档位 ${i+1}`,records:[]}))}
            function saveAllSlots(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
            function renderSlotGrid(){const s=loadAllSlots();const g=document.getElementById('slotGrid');g.innerHTML='';s.forEach((slot,idx)=>{const c=document.createElement('div');c.className='slot-card';c.innerHTML=`<span class="slot-delete" data-idx="${idx}" title="清空">🗑</span><div class="slot-name">${slot.name} <span class="slot-rename" data-idx="${idx}">✎</span></div><div class="slot-count">${slot.records.length}/${MAX_RECORDS} 条</div>`;c.addEventListener('click',(e)=>{if(e.target.classList.contains('slot-delete')){e.stopPropagation();showThemeConfirm(`确定要清空“${slot.name}”的全部记录吗？此操作不可恢复。`,()=>{slot.records=[];saveAllSlots(s);renderSlotGrid()});return}if(e.target.classList.contains('slot-rename')){e.stopPropagation();targetRenameIdx=idx;document.getElementById('renameInput').value=slot.name;document.getElementById('renameModal').style.display='block';document.getElementById('renameInput').focus();return}openSlot(idx)});g.appendChild(c)})}
            function openSlot(idx){currentArchiveSlot=idx;const slots=loadAllSlots();const slot=slots[idx];document.getElementById('slotGrid').style.display='none';document.getElementById('recordSection').classList.add('active');document.getElementById('currentSlotTitle').textContent=`📂 ${slot.name}`;buildIVFields();document.getElementById('childName').value='';document.getElementById('childGender').value='';document.getElementById('childNature').value='';document.getElementById('childNatureHint').textContent='';document.querySelectorAll('#childIV input').forEach(inp=>{inp.value='';inp.classList.remove('filled')});childNameEdited=false;const mn=document.getElementById('motherName').value.trim();if(mn&&!childNameEdited){document.getElementById('childName').value=mn}renderRecordList()}
            function closeSlot(){currentArchiveSlot=-1;document.getElementById('slotGrid').style.display='grid';document.getElementById('recordSection').classList.remove('active');renderSlotGrid()}
            function buildIVFields(){const cs=['fatherIV','motherIV','childIV'];cs.forEach(id=>{const d=document.getElementById(id);d.innerHTML='';IV_LABELS_ORDER.forEach((lb,i)=>{const it=document.createElement('span');it.className='iv-item';const inp=document.createElement('input');inp.type='text';inp.readOnly=true;inp.placeholder=lb;inp.title=lb;inp.dataset.index=i;inp.addEventListener('click',(e)=>{e.stopPropagation();hideAllPopups();showIVPopup(it,id,i)});const pp=document.createElement('div');pp.className='popup';[7,8,9,10].forEach(v=>{const btn=document.createElement('button');btn.textContent=v;btn.addEventListener('click',(ev)=>{ev.stopPropagation();setIVValue(id,i,v);pp.style.display='none';updateIVHighlight(id)});pp.appendChild(btn)});const clr=document.createElement('button');clr.textContent='×';clr.style.background='#c0392b';clr.style.color='white';clr.addEventListener('click',(ev)=>{ev.stopPropagation();setIVValue(id,i,null);pp.style.display='none';updateIVHighlight(id)});pp.appendChild(clr);it.appendChild(inp);it.appendChild(pp);d.appendChild(it)})});document.addEventListener('click',hideAllPopups)}
            function updateIVHighlight(cid){document.querySelectorAll(`#${cid} .iv-item input`).forEach(inp=>{if(inp.value)inp.classList.add('filled');else inp.classList.remove('filled')})}
            function showIVPopup(item,cid,idx){const cv=getCurrentIVValues(cid);const fc=cv.filter(v=>v!==null).length;if(fc>=MAX_IV_COUNT&&!cv[idx]){alert('每只精灵最多选择3个个体值！');return}const pp=item.querySelector('.popup');if(pp)pp.style.display='flex'}
            function hideAllPopups(){document.querySelectorAll('.iv-item .popup').forEach(p=>p.style.display='none')}
            function setIVValue(cid,idx,val){const c=document.getElementById(cid);const items=c.querySelectorAll('.iv-item');const inp=items[idx].querySelector('input');if(val!==null&&val!==undefined){const cur=getCurrentIVValues(cid);const fc=cur.filter(v=>v!==null).length;if(cur[idx]===null&&fc>=MAX_IV_COUNT){alert('最多选择3个个体值！');return}inp.value=val}else{inp.value=''}}
            function getCurrentIVValues(cid){const c=document.getElementById(cid);const inputs=c.querySelectorAll('input');return Array.from(inputs).map(inp=>inp.value?parseInt(inp.value):null)}
            function getNatureHint(n){const nd=NATURE_DATA[n];if(!nd)return'';if(nd.plus==='平衡')return'平衡';return`${nd.plus}↑ ${nd.minus?nd.minus+'↓':''}`}
            document.addEventListener('input',function(e){if(e.target.id==='fatherNature')document.getElementById('fatherNatureHint').textContent=getNatureHint(e.target.value.trim());else if(e.target.id==='motherNature')document.getElementById('motherNatureHint').textContent=getNatureHint(e.target.value.trim());else if(e.target.id==='childNature')document.getElementById('childNatureHint').textContent=getNatureHint(e.target.value.trim());else if(e.target.id==='motherName'){if(!childNameEdited){document.getElementById('childName').value=e.target.value.trim()}}else if(e.target.id==='childName')childNameEdited=true});

            // 性格继承分析函数
            function analyzeNatureInheritance(fatherNature, motherNature, childNature) {
                if (!childNature) return { text: '', golden: false };
                const childData = NATURE_DATA[childNature];
                const fatherData = NATURE_DATA[fatherNature] || {};
                const motherData = NATURE_DATA[motherNature] || {};

                // 完全相同
                if (fatherNature === childNature && motherNature === childNature) {
                    return { text: '性格完美继承', golden: true };
                }
                // 仅继承父本
                if (fatherNature === childNature) {
                    return { text: '性格继承父本', golden: false };
                }
                // 仅继承母本
                if (motherNature === childNature) {
                    return { text: '性格继承母本', golden: false };
                }

                // 增益/减益比较
                let inheritanceParts = [];
                if (childData.plus) {
                    if (fatherData.plus === childData.plus && motherData.plus === childData.plus) {
                        inheritanceParts.push('性格继承父母本正面');
                    } else if (fatherData.plus === childData.plus) {
                        inheritanceParts.push('性格继承父本正面');
                    } else if (motherData.plus === childData.plus) {
                        inheritanceParts.push('性格继承母本正面');
                    }
                    if (fatherData.minus === childData.minus && motherData.minus === childData.minus) {
                        inheritanceParts.push('性格继承父母本负面');
                    } else if (fatherData.minus === childData.minus) {
                        inheritanceParts.push('性格继承父本负面');
                    } else if (motherData.minus === childData.minus) {
                        inheritanceParts.push('性格继承母本负面');
                    }
                }

                if (inheritanceParts.length > 0) {
                    return { text: inheritanceParts.join('，'), golden: false };
                }

                return { text: '性格全歪', golden: false };
            }

            function renderRecordList(){
                if(currentArchiveSlot<0) return;
                const slots = loadAllSlots();
                const records = slots[currentArchiveSlot].records;
                const list = document.getElementById('recordList');
                list.innerHTML = '';
                if(records.length===0){ list.innerHTML='<li style="color:#666;padding:10px;">暂无记录</li>'; return; }
                records.forEach((rec, idx)=>{
                    const li = document.createElement('li');
                    li.className = 'record-item';
                    const ivStr = rec.iv ? rec.iv.map((v,i)=> v!==null ? `${IV_LABELS_ORDER[i]}:${v}` : '').filter(Boolean).join('，') : '-';

                    const inherit = analyzeNatureInheritance(rec.fatherNature, rec.motherNature, rec.nature);
                    if (inherit.golden) {
                        li.classList.add('golden');
                    }

                    li.innerHTML = `
                        <div>
                            <strong style="color:#c0392b;">${idx+1}.</strong> ${rec.name||'未命名'} ${rec.gender||''} 性格:${rec.nature||'-'} 个体:${ivStr||'无'}
                            <div style="font-size:0.8rem; color:${inherit.golden?'#b8860b':'#2c5068'}; margin-top:2px;">${inherit.text}</div>
                        </div>
                        <button onclick="deleteRecord(${idx})">删除</button>
                    `;
                    list.appendChild(li);
                });
            }

            window.deleteRecord=function(idx){const slots=loadAllSlots();slots[currentArchiveSlot].records.splice(idx,1);saveAllSlots(slots);renderRecordList()};
            function addRecord(){
                const fn=document.getElementById('fatherName').value.trim(),fna=document.getElementById('fatherNature').value.trim(),fiv=getCurrentIVValues('fatherIV');
                const mn=document.getElementById('motherName').value.trim(),mna=document.getElementById('motherNature').value.trim(),miv=getCurrentIVValues('motherIV');
                const cn=document.getElementById('childName').value.trim(),cg=document.getElementById('childGender').value,cna=document.getElementById('childNature').value.trim(),civ=getCurrentIVValues('childIV');
                if(!cn){alert('请填写子代名称');return}
                const slots=loadAllSlots();
                if(slots[currentArchiveSlot].records.length>=MAX_RECORDS){alert('已达99条上限！');return}
                const rec={name:cn,gender:cg,nature:cna,iv:civ,fatherName:fn,fatherNature:fna,fatherIV:fiv,motherName:mn,motherNature:mna,motherIV:miv};
                slots[currentArchiveSlot].records.push(rec);saveAllSlots(slots);
                document.getElementById('childName').value='';document.getElementById('childGender').value='';document.getElementById('childNature').value='';document.getElementById('childNatureHint').textContent='';
                document.querySelectorAll('#childIV input').forEach(inp=>{inp.value='';inp.classList.remove('filled')});
                childNameEdited=false;if(document.getElementById('motherName').value.trim()){document.getElementById('childName').value=document.getElementById('motherName').value.trim()}
                renderRecordList()
            }
            function showThemeConfirm(msg,cb){document.getElementById('themeConfirmMsg').textContent=msg;document.getElementById('themeConfirmOverlay').classList.add('active');themeConfirmCallback=cb}
            document.getElementById('themeConfirmYes').addEventListener('click',()=>{if(themeConfirmCallback)themeConfirmCallback();document.getElementById('themeConfirmOverlay').classList.remove('active');themeConfirmCallback=null});
            document.getElementById('themeConfirmNo').addEventListener('click',()=>{document.getElementById('themeConfirmOverlay').classList.remove('active');themeConfirmCallback=null});
            document.getElementById('renameConfirmBtn').addEventListener('click',()=>{const nn=document.getElementById('renameInput').value.trim();if(nn&&targetRenameIdx>=0){const slots=loadAllSlots();slots[targetRenameIdx].name=nn;saveAllSlots(slots);renderSlotGrid()}document.getElementById('renameModal').style.display='none';targetRenameIdx=-1});
            document.getElementById('renameCancelBtn').addEventListener('click',()=>{document.getElementById('renameModal').style.display='none';targetRenameIdx=-1});
            document.getElementById('openArchiveBtn').addEventListener('click',()=>{document.getElementById('archiveOverlay').classList.add('active');currentArchiveSlot=-1;document.getElementById('slotGrid').style.display='grid';document.getElementById('recordSection').classList.remove('active');renderSlotGrid()});
            document.getElementById('closeArchiveBtn').addEventListener('click',()=>document.getElementById('archiveOverlay').classList.remove('active'));
            document.getElementById('backToSlotsBtn').addEventListener('click',closeSlot);
            document.getElementById('addRecordBtn').addEventListener('click',addRecord);

            createGemGrid('fatherGems','father'); createGemGrid('motherGems','mother'); createKingBallRadios(); updateBadges(); createBubbles();

            // 计算按钮
            document.getElementById('calculateBtn').addEventListener('click', function(){
                const fatherVals = getChecked('father');
                const motherVals = getChecked('mother');
                const btn = this;
                if (fatherVals.length === 0 || motherVals.length === 0) {
                    btn.classList.add('shake-error');
                    setTimeout(() => btn.classList.remove('shake-error'), 500);
                    return;
                }
                const useKing = document.getElementById('useKingBall').checked;
                const kingAttr = useKing ? getSelectedKingBallAttr() : null;
                const calc = new BreedCalculator(fatherVals, motherVals, kingAttr);
                displayResults(calc);
            });

            window.addEventListener('load',()=>{
                const fatherDef=['生命','速度'], motherDef=['生命','速度'];
                document.querySelectorAll('#fatherGems input').forEach(cb=>{ if(fatherDef.includes(cb.value))cb.checked=true; });
                document.querySelectorAll('#motherGems input').forEach(cb=>{ if(motherDef.includes(cb.value))cb.checked=true; });
                updateBadges();
            });
        })();
    </script>
