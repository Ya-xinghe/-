    <script>
        (function() {
            const SLOTS = ["生命", "物攻", "物防", "魔攻", "魔防", "速度"];
            let compareSlots = [null, null];
            let currentResultSnapshot = null;

            function createBubbles() {
                const container = document.getElementById('bubblesContainer');
                for (let i = 0; i < 15; i++) {
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');
                    const size = Math.random() * 30 + 10;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    bubble.style.left = Math.random() * 100 + '%';
                    bubble.style.animationDuration = Math.random() * 8 + 6 + 's';
                    bubble.style.animationDelay = Math.random() * 10 + 's';
                    container.appendChild(bubble);
                }
            }

            function combinations(arr, k) {
                if (k === 0) return [[]];
                if (arr.length < k) return [];
                const result = [];
                function helper(start, chosen) {
                    if (chosen.length === k) { result.push([...chosen]); return; }
                    for (let i = start; i < arr.length; i++) {
                        chosen.push(arr[i]);
                        helper(i + 1, chosen);
                        chosen.pop();
                    }
                }
                helper(0, []); return result;
            }

            function permutations(arr) {
                if (arr.length === 0) return [[]];
                const result = [];
                function permute(remaining, current) {
                    if (remaining.length === 0) { result.push([...current]); return; }
                    for (let i = 0; i < remaining.length; i++) {
                        const nextRem = remaining.slice(0, i).concat(remaining.slice(i + 1));
                        current.push(remaining[i]);
                        permute(nextRem, current);
                        current.pop();
                    }
                }
                permute(arr, []); return result;
            }

            class BreedCalculator {
                constructor(fatherSet, motherSet, kingBallAttr = null) {
                    this.fatherSet = new Set(fatherSet);
                    this.motherSet = new Set(motherSet);
                    this.fatherNum = this.fatherSet.size;
                    this.motherNum = this.motherSet.size;
                    this.kingBallAttr = kingBallAttr;
                    this.isKingBall = kingBallAttr !== null;

                    this.weights = {};
                    for (let slot of SLOTS) {
                        let cnt = (this.fatherSet.has(slot) ? 1 : 0) + (this.motherSet.has(slot) ? 1 : 0);
                        this.weights[slot] = 100 + 300 * cnt;
                    }
                    this.totalWeight = Object.values(this.weights).reduce((a, b) => a + b, 0);

                    if (this.isKingBall) {
                        this.effectiveSlots = SLOTS.filter(s => s !== this.kingBallAttr);
                        this.effectiveWeights = {};
                        for (let slot of this.effectiveSlots) this.effectiveWeights[slot] = this.weights[slot];
                        this.totalEffectiveWeight = Object.values(this.effectiveWeights).reduce((a, b) => a + b, 0);
                        this.effectiveK = 2;
                    }

                    this.prob1 = this.prob2 = this.prob3 = 0;
                    if (this.isKingBall) this.prob3 = 1;
                    else this._calcCountProbs();
                    this.comboCache = {};
                }

                _calcCountProbs() {
                    const w1 = 0;
                    const w2 = 100 + (this.fatherNum === 2 ? 300 : 0) + (this.motherNum === 2 ? 300 : 0);
                    const w3 = 100 + (this.fatherNum === 3 ? 300 : 0) + (this.motherNum === 3 ? 300 : 0);
                    const total = w1 + w2 + w3;
                    this.prob1 = total === 0 ? 0 : w1 / total;
                    this.prob2 = total === 0 ? 0 : w2 / total;
                    this.prob3 = total === 0 ? 0 : w3 / total;
                }

                probabilityOfExactCombo(combo) {
                    const k = combo.length;
                    const key = combo.slice().sort().join(',');
                    if (!this.comboCache[k]) this.comboCache[k] = {};
                    if (this.comboCache[k][key] !== undefined) return this.comboCache[k][key];
                    let prob = 0;
                    const perms = permutations(combo);
                    for (let perm of perms) {
                        let p = 1.0;
                        let remainingW = this.totalWeight;
                        for (let slot of perm) {
                            p *= this.weights[slot] / remainingW;
                            remainingW -= this.weights[slot];
                        }
                        prob += p;
                    }
                    this.comboCache[k][key] = prob;
                    return prob;
                }

                probabilityOfEffectiveCombo(combo) {
                    if (combo.length !== this.effectiveK) return 0;
                    const key = combo.slice().sort().join(',');
                    const cacheKey = 'eff_' + key;
                    if (!this.comboCache[this.effectiveK]) this.comboCache[this.effectiveK] = {};
                    if (this.comboCache[this.effectiveK][cacheKey] !== undefined) return this.comboCache[this.effectiveK][cacheKey];
                    let prob = 0;
                    const perms = permutations(combo);
                    for (let perm of perms) {
                        let p = 1.0;
                        let remainingW = this.totalEffectiveWeight;
                        for (let slot of perm) {
                            p *= this.effectiveWeights[slot] / remainingW;
                            remainingW -= this.effectiveWeights[slot];
                        }
                        prob += p;
                    }
                    this.comboCache[this.effectiveK][cacheKey] = prob;
                    return prob;
                }

                getTotalProbability(condition) {
                    let total = 0;
                    for (let k = 1; k <= 3; k++) {
                        const probK = k === 1 ? this.prob1 : (k === 2 ? this.prob2 : this.prob3);
                        if (probK === 0) continue;
                        const combos = combinations(SLOTS, k);
                        let sum = 0;
                        for (let combo of combos) if (condition(combo)) sum += this.probabilityOfExactCombo(combo);
                        total += probK * sum;
                    }
                    return total;
                }

                getKingBallProbability(condition) {
                    if (!this.isKingBall) return 0;
                    let sum = 0;
                    const combos = combinations(this.effectiveSlots, 2);
                    for (let combo of combos) if (condition(combo)) sum += this.probabilityOfEffectiveCombo(combo);
                    return sum;
                }

                getSingleAttrProbs() {
                    const result = {};
                    for (let slot of SLOTS) {
                        if (this.isKingBall && slot === this.kingBallAttr) result[slot] = 1.0;
                        else if (this.isKingBall) result[slot] = this.getKingBallProbability(combo => combo.includes(slot));
                        else result[slot] = this.getTotalProbability(combo => combo.includes(slot));
                    }
                    return result;
                }

                getTargetProb(targetArr) {
                    const uniq = [...new Set(targetArr)];
                    if (uniq.length === 0) return 0;
                    if (this.isKingBall) {
                        if (!uniq.includes(this.kingBallAttr)) return 0;
                        const remaining = uniq.filter(s => s !== this.kingBallAttr);
                        if (remaining.length > this.effectiveK) return 0;
                        if (remaining.length === 0) return 1;
                        return this.getKingBallProbability(combo => remaining.every(t => combo.includes(t)));
                    } else {
                        return this.getTotalProbability(combo => uniq.every(a => combo.includes(a)));
                    }
                }

                getKingBallRecommendation(targetAttrs) {
                    if (!this.isKingBall) return "";
                    const remaining = targetAttrs.filter(s => s !== this.kingBallAttr);
                    if (remaining.length === 0) return "目标仅包含性格属性，国王球已保证。";
                    if (remaining.length > 2) return "目标属性过多，无法全部继承。";
                    const recParents = remaining.join('、');
                    return `推荐使用父母本双方都只有【${recParents}】两条相同个体值的精灵，搭配国王球契约，可最大化完美继承概率。`;
                }
            }

            function enforceMaxSelection(cb, groupName) {
                const all = document.querySelectorAll(`input[name="${groupName}"]`);
                if (Array.from(all).filter(c => c.checked).length > 3) {
                    cb.checked = false;
                    const label = cb.parentElement;
                    label.classList.add('shake-error');
                    setTimeout(() => label.classList.remove('shake-error'), 500);
                }
            }

            function createGemGrid(containerId, groupName) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                SLOTS.forEach(slot => {
                    const label = document.createElement('label');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox'; cb.value = slot; cb.name = groupName;
                    cb.addEventListener('change', function() {
                        enforceMaxSelection(cb, groupName);
                        updateBadges();
                    });
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(slot));
                    container.appendChild(label);
                });
            }

            function getChecked(groupName) {
                return Array.from(document.querySelectorAll(`input[name="${groupName}"]:checked`)).map(cb => cb.value);
            }

            function updateBadges() {
                document.getElementById('fatherBadge').textContent = getChecked('father').length + '条';
                document.getElementById('motherBadge').textContent = getChecked('mother').length + '条';
            }

            function createKingBallRadios() {
                const container = document.getElementById('kingBallRadios');
                container.innerHTML = '';
                SLOTS.forEach(slot => {
                    const label = document.createElement('label');
                    const radio = document.createElement('input');
                    radio.type = 'radio'; radio.name = 'kingball'; radio.value = slot;
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(slot));
                    container.appendChild(label);
                });
                const firstRadio = container.querySelector('input');
                if (firstRadio) firstRadio.checked = true;
            }

            function getSelectedKingBallAttr() {
                const radio = document.querySelector('input[name="kingball"]:checked');
                return radio ? radio.value : null;
            }

            document.getElementById('useKingBall').addEventListener('change', function() {
                document.getElementById('kingBallAttrArea').style.display = this.checked ? 'flex' : 'none';
            });

            function displayResults(calc) {
                const area = document.getElementById('resultsArea');
                area.classList.add('active');
                const fatherVals = Array.from(calc.fatherSet);
                const motherVals = Array.from(calc.motherSet);
                const kingAttr = calc.kingBallAttr;

                currentResultSnapshot = {
                    father: fatherVals,
                    mother: motherVals,
                    kingBall: kingAttr,
                    prob1: calc.prob1,
                    prob2: calc.prob2,
                    prob3: calc.prob3,
                    singles: calc.getSingleAttrProbs(),
                    target: null,
                    targetProb: null
                };

                let html = '';
                html += `<div class="scroll-card">
                    <h3>📜 遗传条数占卜</h3>
                    <div class="prob-row">
                        <div class="prob-stone"><div class="value">${(calc.prob1*100).toFixed(2)}%</div><div class="tag">1条个体</div></div>
                        <div class="prob-stone"><div class="value">${(calc.prob2*100).toFixed(2)}%</div><div class="tag">2条个体</div></div>
                        <div class="prob-stone"><div class="value">${(calc.prob3*100).toFixed(2)}%</div><div class="tag">3条个体</div></div>
                    </div>`;
                if (calc.isKingBall) {
                    html += `<p style="color:#b8860b; margin-top:8px;">👑 国王球契约生效，子代必定为三条个体，以下结果为子代成功继承到“（<strong>${calc.kingBallAttr}</strong>）”的结果</p>`;
                }
                html += `</div>`;

                const singles = calc.getSingleAttrProbs();
                html += `<div class="scroll-card">
                    <h3>
                        <img src="https://patchwiki.biligame.com/images/rocom/e/e4/15ca1cfmq9j16571121rp8b7xbirdzt.png" style="width:24px; height:24px; vertical-align:middle; margin-right:6px; filter:drop-shadow(0 0 6px #a855f7);" alt="占卜球">
                        六维属性预言
                    </h3>
                    <table class="attr-table">
                        <tr><th>属性</th><th>遗传概率</th></tr>`;
                for (let s of SLOTS) {
                    html += `<tr><td>${s}</td><td>${(singles[s]*100).toFixed(2)}%</td></tr>`;
                }
                html += `</table></div>`;

                html += `<div class="scroll-card">
                    <h3>
                        <img src="https://patchwiki.biligame.com/images/rocom/9/95/ksozotzjdbpobfw37170k4fr513iufu.png" class="icon-medal" alt="完美奖牌">
                        完美继承概率计算
                    </h3>
                    <p class="tiny-note">选择你希望子代同时拥有的属性（最多3个）</p>
                    <div style="margin-bottom:8px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                        <button class="btn-small" id="presetParentsBtn">一键填入父母所拥有个体</button>
                        <button class="btn-small" id="calcTargetBtn" style="padding:8px 20px; font-size:0.9rem;">开始计算</button>
                    </div>
                    <div class="target-area">
                        <div class="gem-grid" id="targetGems"></div>
                    </div>
                    <p class="error-txt" id="targetError" style="display:none;"></p>
                    <div id="targetResultWrapper" style="text-align:center; margin: 12px 0;">
                        <span class="target-result" id="targetResult">—</span>
                    </div>

                    <div style="margin-top:15px;">
                        <label style="font-weight:bold;">
                            <img src="https://patchwiki.biligame.com/images/rocom/0/0d/gkijb43j6tp5kadtksuux84zwrrawua.png" style="width:24px; height:24px; vertical-align:middle; margin-right:6px; filter:drop-shadow(0 0 4px #ffcc00);" alt="神奇的蛋">
                            孵化次数模拟：
                        </label>
                        <div class="simulator-area">
                            <span>预计准备</span>
                            <input type="number" id="eggCount" placeholder="数量" min="1" value="10">
                            <span>个蛋，至少成功一次的概率：</span>
                            <span id="simulatedProb" style="font-weight:bold; color:#2d5a0c; font-size:1.2rem;">—</span>
                        </div>
                    </div>
                    <div id="recommendArea" style="margin-top:15px;"></div>
                    <div class="compare-buttons">
                        <button class="btn-small" id="saveToSlotA">📋 保存到方案一</button>
                        <button class="btn-small" id="saveToSlotB">📋 保存到方案二</button>
                    </div>
                </div>`;

                area.innerHTML = html;

                const targetContainer = document.getElementById('targetGems');
                SLOTS.forEach(slot => {
                    const label = document.createElement('label');
                    const cb = document.createElement('input');
                    cb.type = 'checkbox'; cb.value = slot; cb.name = 'target';
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(slot));
                    targetContainer.appendChild(label);
                });

                document.getElementById('presetParentsBtn').addEventListener('click', () => {
                    const fatherSet = new Set(getChecked('father'));
                    const motherSet = new Set(getChecked('mother'));
                    const union = new Set([...fatherSet, ...motherSet]);
                    document.querySelectorAll('input[name="target"]').forEach(cb => {
                        cb.checked = union.has(cb.value);
                    });
                });

                function updateSnapshotTarget() {
                    if (currentResultSnapshot) {
                        const selected = getChecked('target');
                        if (selected.length > 0 && selected.length <= 3) {
                            currentResultSnapshot.target = selected;
                            currentResultSnapshot.targetProb = calc.getTargetProb(selected);
                        }
                    }
                }

                function computeAndSimulate() {
                    const selected = getChecked('target');
                    const errEl = document.getElementById('targetError');
                    const resEl = document.getElementById('targetResult');
                    const simEl = document.getElementById('simulatedProb');
                    errEl.style.display = 'none'; resEl.textContent = '—'; simEl.textContent = '—';
                    if (selected.length === 0) { errEl.textContent = '请至少选择一项属性！'; errEl.style.display = 'inline-block'; return; }
                    if (selected.length > 3) { errEl.textContent = '最多只能选择3项属性！'; errEl.style.display = 'inline-block'; return; }
                    const prob = calc.getTargetProb(selected);
                    resEl.textContent = `${(prob*100).toFixed(2)}%`;
                    const eggInput = document.getElementById('eggCount');
                    const n = parseInt(eggInput.value) || 0;
                    if (n > 0 && prob > 0) simEl.textContent = `${((1 - Math.pow(1 - prob, n))*100).toFixed(2)}%`;
                    const recArea = document.getElementById('recommendArea');
                    if (calc.isKingBall && selected.length > 0) {
                        recArea.innerHTML = `<div class="recommend-box">💡 国王球最优配置建议：${calc.getKingBallRecommendation(selected)}</div>`;
                    } else recArea.innerHTML = '';
                    updateSnapshotTarget();
                }

                document.getElementById('calcTargetBtn').addEventListener('click', computeAndSimulate);
                document.getElementById('eggCount').addEventListener('input', () => {
                    if (document.getElementById('targetResult').textContent.includes('%')) computeAndSimulate();
                });

                document.getElementById('saveToSlotA').addEventListener('click', () => {
                    if (!currentResultSnapshot) return;
                    updateSnapshotTarget();
                    compareSlots[0] = { ...currentResultSnapshot };
                    renderComparePanel();
                });
                document.getElementById('saveToSlotB').addEventListener('click', () => {
                    if (!currentResultSnapshot) return;
                    updateSnapshotTarget();
                    compareSlots[1] = { ...currentResultSnapshot };
                    renderComparePanel();
                });

                area.scrollIntoView({ behavior: 'smooth' });
            }

            function renderComparePanel() {
                let existingPanel = document.querySelector('.compare-panel');
                if (!existingPanel) {
                    const area = document.getElementById('resultsArea');
                    const panel = document.createElement('div');
                    panel.className = 'compare-panel scroll-card';
                    panel.id = 'comparePanel';
                    area.appendChild(panel);
                    existingPanel = panel;
                }
                if (!compareSlots[0] && !compareSlots[1]) {
                    existingPanel.classList.remove('active');
                    return;
                }
                existingPanel.classList.add('active');

                let maxProb = -1;
                let winners = [false, false];
                const probA = compareSlots[0]?.targetProb ?? -1;
                const probB = compareSlots[1]?.targetProb ?? -1;
                if (probA > probB && probA >= 0) winners[0] = true;
                if (probB > probA && probB >= 0) winners[1] = true;

                let html = '<h3>⚖️ 孵蛋方案对比</h3>';
                const slotNames = ['方案一', '方案二'];
                const colors = ['#4a90d9', '#e05a4f'];
                for (let i = 0; i < 2; i++) {
                    const data = compareSlots[i];
                    if (!data) continue;
                    const winnerClass = winners[i] ? 'winner' : '';
                    html += `<div class="compare-slot ${winnerClass}" style="border-color: ${winners[i] ? '#ffd700' : colors[i]};">
                        ${winners[i] ? `<div class="winner-badge" title="概率更高">
                            <img src="https://patchwiki.biligame.com/images/rocom/1/1c/mtb5tqy5cxqcyc2c63pu9rj3ho7w6d2.png" style="width:36px; height:36px;" alt="优胜印泥">
                        </div>` : ''}
                        <strong style="color:${colors[i]};">${slotNames[i]}</strong>
                        <p>父本：${data.father.join('、') || '无'} | 母本：${data.mother.join('、') || '无'} | 国王球：${data.kingBall || '无'}</p>
                        <p>遗传条数：1条 ${(data.prob1*100).toFixed(1)}% | 2条 ${(data.prob2*100).toFixed(1)}% | 3条 ${(data.prob3*100).toFixed(1)}%</p>
                        <p>单属性概率：${SLOTS.map(s => `${s}:${(data.singles[s]*100).toFixed(1)}%`).join('，')}</p>
                        ${data.target ? `<p>完美继承目标：${data.target.join('、')} 概率：<strong>${(data.targetProb*100).toFixed(2)}%</strong></p>` : '<p>尚未计算完美继承</p>'}
                    </div>`;
                }
                html += '<button class="btn-small" id="clearCompareBtn">清除对比</button>';
                existingPanel.innerHTML = html;
                document.getElementById('clearCompareBtn').addEventListener('click', () => {
                    compareSlots = [null, null];
                    renderComparePanel();
                });
                existingPanel.scrollIntoView({ behavior: 'smooth' });
            }

            createGemGrid('fatherGems', 'father');
            createGemGrid('motherGems', 'mother');
            createKingBallRadios();
            updateBadges();
            createBubbles();

            document.getElementById('calculateBtn').addEventListener('click', () => {
                const fatherVals = getChecked('father');
                const motherVals = getChecked('mother');
                const useKing = document.getElementById('useKingBall').checked;
                const kingAttr = useKing ? getSelectedKingBallAttr() : null;
                const calc = new BreedCalculator(fatherVals, motherVals, kingAttr);
                displayResults(calc);
            });

            window.addEventListener('load', () => {
                const fatherChecks = document.querySelectorAll('#fatherGems input');
                const motherChecks = document.querySelectorAll('#motherGems input');
                const fatherDef = ['生命', '速度'];
                const motherDef = ['生命', '速度'];
                fatherChecks.forEach(cb => { if (fatherDef.includes(cb.value)) cb.checked = true; });
                motherChecks.forEach(cb => { if (motherDef.includes(cb.value)) cb.checked = true; });
                updateBadges();
            });
        })();
    </script>
</body>
</html>
